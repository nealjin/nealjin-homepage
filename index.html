<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nealjin - 个人主页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: url('https://images.unsplash.com/photo-1519681393784-d120267933ba?q=80&w=2070&auto=format&fit=crop') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: 0;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 60px 80px;
            max-width: 800px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            text-align: center;
            animation: fadeIn 1s ease-in;
            position: relative;
            z-index: 1;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-size: 3em;
            margin-bottom: 20px;
            color: #667eea;
            font-weight: 300;
            letter-spacing: 2px;
        }

        .subtitle {
            font-size: 1.2em;
            color: #666;
            margin-bottom: 50px;
            font-style: italic;
        }

        .poem {
            font-size: 1.3em;
            line-height: 2.2;
            color: #444;
            margin: 40px 0;
            font-family: 'KaiTi', '楷体', serif;
            text-align: left;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }

        .poem-line {
            margin: 15px 0;
            opacity: 0;
            animation: slideIn 0.8s ease-out forwards;
        }

        .poem-line:nth-child(1) { animation-delay: 0.2s; }
        .poem-line:nth-child(2) { animation-delay: 0.4s; }
        .poem-line:nth-child(3) { animation-delay: 0.6s; }
        .poem-line:nth-child(4) { animation-delay: 0.8s; }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .author {
            text-align: right;
            margin-top: 30px;
            font-size: 1em;
            color: #888;
            font-style: italic;
        }

        .footer {
            margin-top: 50px;
            font-size: 0.9em;
            color: #999;
        }

        .fo           color: #667eea;
            text-decoration: none;
            transition: color 0.3s;
        }

        .footer a:hover {
            color: #764ba2;
        }

        @media (max-width: 768px) {
            .container {
                padding: 40px 30px;
                margin: 20px;
            }

            h1 {
                font-size: 2em;
            }

            .poem {
                font-size: 1.1em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>nealjin</h1>
        <div class="subtitle">在代码与诗意之间</div>
        
        <div class="poem">
            <div class="poem-line">云想衣裳花想容，</div>
            <div class="poem-line">春风拂槛露华浓。</div>
            <div class="poem-line">若非群玉山头见，</div>
            <div class="poem-line">会向瑶台月下逢。</div>
        </div>
        
        <div class="author">—— 李白《清平调·其一》</div>
        
        <div class="footer">
            <p>© 2026 nealjin | <a href="https://github.com/nealjin" target="_blank">GitHub</a></p>
        </div>
    </div>
</body>
</html>
